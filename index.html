<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>tako | Profile</title>
        <style>
            :root {
                --main-color: #2c3e50;
                --accent-color: #0085ff;
                --bg-color: #f4f7f6;
            }
            body {
                font-family:
                    "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN",
                    "Hiragino Sans", sans-serif;
                background: var(--bg-color);
                color: var(--main-color);
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }
            .card {
                background: white;
                width: 90%;
                max-width: 450px;
                padding: 40px 20px;
                border-radius: 20px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
                text-align: center;
            }
            /* アバター画像を丸く表示 */
            .avatar {
                width: 120px;
                height: 120px;
                border-radius: 50%;
                object-fit: cover;
                border: 4px solid white;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
                margin-bottom: 20px;
            }
            h1 {
                margin: 10px 0 5px;
                font-size: 1.8rem;
            }
            .interests {
                font-weight: bold;
                color: #7f8c8d;
                margin-bottom: 20px;
                font-size: 0.9rem;
                letter-spacing: 1px;
            }
            /* P2Pゲーム開発の紹介文 */
            .status-box {
                background: #f9f9f9;
                padding: 15px;
                border-radius: 12px;
                margin: 20px 0;
                font-size: 0.95rem;
                border-left: 4px solid var(--accent-color);
                text-align: left;
            }
            .status-en {
                display: block;
                font-size: 0.85rem;
                color: #666;
                margin-top: 5px;
            }

            .links {
                margin-top: 25px;
            }
            .btn-bsky {
                display: inline-block;
                text-decoration: none;
                background: var(--accent-color);
                color: white;
                padding: 10px 24px;
                border-radius: 30px;
                font-weight: bold;
                transition: opacity 0.2s;
            }
            .btn-bsky:hover {
                opacity: 0.8;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <!-- アバター画像 (avatar.jpg を同じフォルダに置いてください) -->
            <img src="avatar.jpg" alt="tako" class="avatar" />

            <h1>tako</h1>
            <div class="interests">BLENDER / GODOT / PHOTOGRAPHY</div>

            <!-- P2P対戦ゲーム開発の表示 -->
            <div class="status-box">
                <strong
                    >現在、P2Pを利用したオンライン対戦ゲームを開発中です。</strong
                >
                <span class="status-en"
                    >Currently developing a P2P-based online multiplayer
                    game.</span
                >
            </div>

            <div class="links">
                <a
                    href="https://bsky.app/profile/tako-humanoid.bsky.social"
                    class="btn-bsky"
                    target="_blank"
                >
                    🦋 Bluesky
                </a>
            </div>
        </div>
    </body>
</html>
